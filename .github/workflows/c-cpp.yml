ame: CMake and Qt5 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y qt5-qmake qtbase5-dev qttools5-dev cmake

    - name: Create build directory
      run: mkdir -p build

    - name: Configure with CMake
      working-directory: build
      run: cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build project
      working-directory: build
      run: cmake --build .

    - name: Run tests
      working-directory: build
      run: ctest --output-on-failure
